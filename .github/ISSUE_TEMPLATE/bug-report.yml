name: Bug report
description: Report reproducible incorrect behavior.
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Never include an OnAir API key or unsanitized company data.
  - type: input
    id: version
    attributes:
      label: WyrmGrid version
      placeholder: v0.1.0 or commit hash
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Windows, Linux, macOS]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include the expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      render: text
  - type: checkboxes
    id: safety
    attributes:
      label: Data safety
      options:
        - label: I removed API keys and identifying company/player data.
          required: true
