name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          # SvelteKit's current declared range still resolves cookie 0.6.0.
          # WyrmGrid is a static Tauri client and does not construct HTTP cookies.
          # See docs/security/dependency-notes.md; remove when SvelteKit permits >=0.7.0.
          allow-ghsas: GHSA-pxg6-pf52-xh8x

  rust-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
      - uses: taiki-e/install-action@cargo-deny
      - name: Check advisories, licenses, bans, and sources
        run: cargo deny check

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
