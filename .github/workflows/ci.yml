name: CI

on:
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      checkout_ref:
        description: Commit or tag to verify instead of the caller commit
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-core:
    name: Rust core
    if: github.event_name != 'pull_request' || startsWith(github.head_ref, 'codex/release-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check core crates
        run: cargo check --workspace --exclude wyrmgrid-desktop --all-targets
      - name: Lint core crates
        run: cargo clippy --workspace --exclude wyrmgrid-desktop --all-targets -- -D warnings
      - name: Test core crates
        run: cargo test --workspace --exclude wyrmgrid-desktop

  frontend:
    name: Frontend
    if: github.event_name != 'pull_request' || startsWith(github.head_ref, 'codex/release-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Test repository tooling
        run: npm run test:tooling
      - name: Check formatting
        run: npm run format:check
      - name: Type-check Svelte
        run: npm run check
      - name: Test frontend
        run: npm test --workspace @wyrmgrid/desktop
      - name: Build frontend
        run: npm run build

  desktop-windows:
    name: Windows desktop
    if: github.event_name != 'pull_request' || startsWith(github.head_ref, 'codex/release-')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Prepare the bundled simulator provider
        run: npm run provider:prepare
      - name: Check Tauri backend
        run: cargo check -p wyrmgrid-desktop
      - name: Test Tauri backend
        run: cargo test -p wyrmgrid-desktop
      - name: Check the Windows SimConnect provider
        run: cargo check -p wyrmgrid-simconnect-provider --all-targets
      - name: Test the Windows SimConnect provider
        run: cargo test -p wyrmgrid-simconnect-provider

  rust-coverage:
    name: Rust coverage
    if: github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0
          components: llvm-tools-preview
      - uses: taiki-e/install-action@9458fed45835344deb5e69e06e831be047c96abf # cargo-llvm-cov
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Measure core test coverage
        run: cargo llvm-cov --workspace --exclude wyrmgrid-desktop --lcov --output-path rust-lcov.info
      - name: Upload coverage report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: rust-coverage
          path: rust-lcov.info
          retention-days: 14
