name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-core:
    name: Rust core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check core crates
        run: cargo check --workspace --exclude wyrmgrid-desktop --all-targets
      - name: Lint core crates
        run: cargo clippy --workspace --exclude wyrmgrid-desktop --all-targets -- -D warnings
      - name: Test core crates
        run: cargo test --workspace --exclude wyrmgrid-desktop

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check formatting
        run: npm run format:check
      - name: Type-check Svelte
        run: npm run check
      - name: Build frontend
        run: npm run build

  desktop-windows:
    name: Windows desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
      - uses: Swatinem/rust-cache@v2
      - name: Check Tauri backend
        run: cargo check -p wyrmgrid-desktop
