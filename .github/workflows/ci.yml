name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-core:
    name: Rust core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check core crates
        run: cargo check --workspace --exclude wyrmgrid-desktop --all-targets
      - name: Lint core crates
        run: cargo clippy --workspace --exclude wyrmgrid-desktop --all-targets -- -D warnings
      - name: Test core crates
        run: cargo test --workspace --exclude wyrmgrid-desktop

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check formatting
        run: npm run format:check
      - name: Type-check Svelte
        run: npm run check
      - name: Test frontend
        run: npm test --workspace @wyrmgrid/desktop
      - name: Build frontend
        run: npm run build

  desktop-windows:
    name: Windows desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
      - uses: Swatinem/rust-cache@v2
      - name: Prepare the bundled simulator provider
        run: npm run provider:prepare
      - name: Check Tauri backend
        run: cargo check -p wyrmgrid-desktop
      - name: Test Tauri backend
        run: cargo test -p wyrmgrid-desktop
      - name: Check the Windows SimConnect provider
        run: cargo check -p wyrmgrid-simconnect-provider --all-targets
      - name: Test the Windows SimConnect provider
        run: cargo test -p wyrmgrid-simconnect-provider

  rust-coverage:
    name: Rust coverage
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Measure core test coverage
        run: cargo llvm-cov --workspace --exclude wyrmgrid-desktop --lcov --output-path rust-lcov.info
      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: rust-coverage
          path: rust-lcov.info
          retention-days: 14
