name: Release

on:
  push:
    tags: ["v*.*.0"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Version tag to build, such as v0.2.1
        required: true
        type: string
      exception_reason:
        description: Why this non-routine installer build is worth the resources
        required: true
        type: string

permissions:
  contents: write

jobs:
  policy:
    name: Release policy
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.policy.outputs.release_tag }}
    steps:
      - id: policy
        name: Enforce installer build policy
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_TAG: ${{ github.ref_name }}
          MANUAL_TAG: ${{ inputs.release_tag }}
          EXCEPTION_REASON: ${{ inputs.exception_reason }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ ! "$MANUAL_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Manual release_tag must be a semantic version beginning with v." >&2
              exit 1
            fi
            if (( ${#EXCEPTION_REASON} < 20 )); then
              echo "Document a meaningful exception reason of at least 20 characters." >&2
              exit 1
            fi
            echo "release_tag=$MANUAL_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=$PUSH_TAG" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.platform }}
    needs: policy
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --bundles nsis
          - platform: ubuntu-22.04
            args: --bundles appimage,deb
          - platform: macos-latest
            args: --bundles app,dmg
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ needs.policy.outputs.release_tag }}
          releaseName: OnAir WyrmGrid ${{ needs.policy.outputs.release_tag }}
          releaseBody: See the changelog and attached platform packages.
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
